<section class="sample-work" id="sample-work" name="sample-work">
	<h2>
		{{ site.data.sample_work.title }}
	</h2>
	<p>
		{{ site.data.sample_work.desc }}
	</p>
	<div class="sample-work-grid-container">
		{% for image in site.data.sample_work.images %} <a href="{{ image.url }}" target="_blank" rel="noopener noreferrer" class="grid-image" title="{{ image.title }} by {{ image.author }} ({{ image.year }});"> <img src="/images/sample-work/{{ image.src }}" alt="{{ image.title }}"> </a> {% endfor %}
	</div>
	<p>
		{{ site.data.sample_work.outro }}
	</p>
{% assign video = site.data.sample_work.video %}
<div class="video" data-vimeo-id="{{ video.id }}" data-vimeo-title="AC Graphic Design Grads | {{ video.title }} {{ video.year }}" tabindex="0" role="button" aria-label="Play video: {{ video.title }} {{ video.year }}">
	<img src="/images/sample-work/{{ video.poster }}" alt="{{ video.title }} {{ video.year }}" width="1280" height="720" loading="lazy">
	<span class="play-button" aria-hidden="true">
		<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
	</span>
</div>
</section>
<script>
document.querySelectorAll('.video').forEach(function (facade) {
	function loadVideo() {
		var id = facade.getAttribute('data-vimeo-id');
		var title = facade.getAttribute('data-vimeo-title') || 'Video';
		var iframe = document.createElement('iframe');
		iframe.src = 'https://player.vimeo.com/video/' + id + '?autoplay=1&badge=0&autopause=0&player_id=0&app_id=58479';
		iframe.setAttribute('frameborder', '0');
		iframe.setAttribute('allow', 'autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share');
		iframe.setAttribute('referrerpolicy', 'strict-origin-when-cross-origin');
		iframe.setAttribute('title', title);
		facade.innerHTML = '';
		facade.appendChild(iframe);
	}

	facade.addEventListener('click', loadVideo);
	facade.addEventListener('keydown', function (e) {
		if (e.key === 'Enter' || e.key === ' ') {
			e.preventDefault();
			loadVideo();
		}
	});
});
</script>
